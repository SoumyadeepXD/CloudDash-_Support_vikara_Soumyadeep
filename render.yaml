services:
  - type: web
    name: clouddash-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_db
      - key: ANONYMIZED_TELEMETRY
        value: "false"
      - key: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
